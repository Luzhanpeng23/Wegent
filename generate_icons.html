<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h2>右键保存下面的图片为对应的 PNG 文件到 icons/ 目录</h2>
<p>或直接打开浏览器控制台运行脚本自动下载</p>
<div id="icons"></div>
<script>
const sizes = [16, 32, 48, 128];
const container = document.getElementById('icons');

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // 背景圆角矩形
  const r = size * 0.2;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fillStyle = '#4f8cff';
  ctx.fill();

  // 绘制图标 - 简化的浏览器+闪电标志
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = Math.max(1, size * 0.06);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const p = size * 0.2; // padding
  const w = size - 2 * p;
  const h = size - 2 * p;

  // 浏览器框框
  const bx = p, by = p, bw = w, bh = h;
  const br = size * 0.08;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, br);
  ctx.stroke();

  // 顶部导航栏线
  const barY = by + bh * 0.25;
  ctx.beginPath();
  ctx.moveTo(bx, barY);
  ctx.lineTo(bx + bw, barY);
  ctx.stroke();

  // 导航栏圆点
  const dotR = Math.max(1, size * 0.035);
  const dotY = by + (barY - by) / 2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(bx + bw * 0.12 + i * bw * 0.1, dotY, dotR, 0, Math.PI * 2);
    ctx.fill();
  }

  // 闪电标志（居中在浏览器内容区域）
  const cx = bx + bw / 2;
  const cy = barY + (by + bh - barY) / 2;
  const ls = w * 0.18;

  ctx.beginPath();
  ctx.moveTo(cx + ls * 0.1, cy - ls * 1.1);
  ctx.lineTo(cx - ls * 0.6, cy + ls * 0.1);
  ctx.lineTo(cx + ls * 0.05, cy + ls * 0.1);
  ctx.lineTo(cx - ls * 0.1, cy + ls * 1.1);
  ctx.lineTo(cx + ls * 0.6, cy - ls * 0.1);
  ctx.lineTo(cx - ls * 0.05, cy - ls * 0.1);
  ctx.closePath();
  ctx.fill();

  // 显示并提供下载
  const div = document.createElement('div');
  div.style.cssText = 'display:inline-block;margin:10px;text-align:center';
  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  img.style.cssText = `width:${Math.max(size, 48)}px;height:${Math.max(size, 48)}px;image-rendering:pixelated`;
  div.appendChild(img);
  div.appendChild(document.createElement('br'));

  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `icon${size}.png`;
  link.textContent = `icon${size}.png (${size}x${size})`;
  div.appendChild(link);

  container.appendChild(div);
});
</script>
</body>
</html>
