<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- 顶部栏 -->
    <header class="header">
      <div class="header-left">
        <svg class="logo-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 12l2 2 4-4"/>
        </svg>
        <h1 class="header-title">DOM Agent</h1>
      </div>
      <div class="header-actions">
        <button id="btn-clear" class="icon-btn" title="清空对话">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/>
          </svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="设置">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 设置面板 -->
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-content">
        <div class="settings-section">
          <div class="settings-section-title">API 配置</div>
          <div class="form-group">
            <label>API Base URL</label>
            <input type="text" id="input-api-base" placeholder="https://api.openai.com/v1" />
          </div>
          <div class="form-group">
            <label>API Key</label>
            <div class="input-with-action">
              <input type="password" id="input-api-key" placeholder="sk-..." />
              <button id="btn-toggle-key" class="icon-btn-sm" title="显示/隐藏">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label>模型</label>
            <input type="text" id="input-model" placeholder="gpt-4o" />
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">参数调整</div>
          <div class="form-row">
            <div class="form-group form-group-half">
              <label>最大调用轮次</label>
              <input type="number" id="input-max-loops" min="1" max="50" placeholder="20" />
            </div>
            <div class="form-group form-group-half">
              <label>最大 Tokens</label>
              <input type="number" id="input-max-tokens" min="256" max="128000" placeholder="4096" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group form-group-half">
              <label>Temperature</label>
              <input type="number" id="input-temperature" min="0" max="2" step="0.1" placeholder="0.7" />
            </div>
            <div class="form-group form-group-half">
              <label>Top P</label>
              <input type="number" id="input-top-p" min="0" max="1" step="0.05" placeholder="1" />
            </div>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">系统提示词</div>
          <div class="form-group">
            <textarea id="input-system-prompt" rows="4" placeholder="自定义 system prompt..."></textarea>
          </div>
        </div>

        <div class="settings-actions">
          <button id="btn-save-settings" class="btn-primary">保存设置</button>
          <button id="btn-cancel-settings" class="btn-secondary">取消</button>
        </div>
      </div>
    </div>

    <!-- 聊天区域 -->
    <main class="chat-container" id="chat-container">
      <div class="welcome-message">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <path d="M8 12h8M12 8v8"/>
          </svg>
        </div>
        <h2>你好，我是 DOM Agent</h2>
        <p>我可以帮你操控当前网页。试试告诉我：</p>
        <div class="suggestion-chips">
          <button class="chip" data-text="帮我看看这个页面有什么内容">📄 查看页面内容</button>
          <button class="chip" data-text="找到页面上所有的链接">🔗 查找所有链接</button>
          <button class="chip" data-text="滚动到页面底部">⬇️ 滚动到底部</button>
          <button class="chip" data-text="截取当前页面截图">📸 截取截图</button>
        </div>
      </div>
    </main>

    <!-- 输入区域 -->
    <footer class="input-area">
      <div class="input-wrapper">
        <textarea
          id="input-message"
          placeholder="描述你想执行的操作..."
          rows="1"
        ></textarea>
        <button id="btn-send" class="send-btn" title="发送">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
